mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.procrastination.killer.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: YT7xP9mK2vR5wQ8nL3jH6cF1dB4gU0sXzE9yI2oA5pV7tW3rM6uN1kC8hJ4fQ0x
  expiration: 86400000

knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: /**
      packages-to-scan: com.procrastination.killer.controller

logging:
  level:
    com.procrastination.killer: debug
    org.springframework.ai: debug
    com.baomidou.mybatisplus: debug
